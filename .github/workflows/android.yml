name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Clean Build (Strict Gradle 8.7)
      run: |
        cd android
        # We manually hardcoded the wrapper to 8.7 in the repo.
        # Now we just use the system gradle to ENSURE the wrapper is generated correctly for the build.
        gradle wrapper --gradle-version 8.7
        chmod +x gradlew
        ./gradlew assembleDebug --stacktrace --warning-mode all

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: barta-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk

    - name: Create Release
      uses: softprops/action-gh-release@v2
      if: github.ref == 'refs/heads/main'
      with:
        tag_name: "v1.0.${{ github.run_number }}"
        name: "Barta App v1.0.${{ github.run_number }}"
        body: "Barta Messenger - FINAL STABLE RELEASE (Gradle 8.7 Fix)"
        files: android/app/build/outputs/apk/debug/app-debug.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
