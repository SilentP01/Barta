name: Android CI/CD

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 9.5.1

    - name: Build APK
      run: |
        cd android
        # Use system gradle to avoid missing wrapper jar issues
        gradle clean assembleRelease --stacktrace
        
        # Ensure release directory exists
        mkdir -p ../release
        
        # Find the generated APK and move/rename it
        find app/build/outputs/apk/release -name "*.apk" -exec mv {} ../release/Barta.apk \;

    - name: Create Release
      if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
      uses: ncipollo/release-action@v1
      with:
        artifacts: "release/Barta.apk"
        tag: "latest"
        name: "Barta Latest Release"
        body: "Automated build from GitHub Actions. Your permanent download link is: https://github.com/${{ github.repository }}/releases/latest/download/Barta.apk"
        token: ${{ secrets.GITHUB_TOKEN }}
        allowUpdates: true
        removeArtifacts: true
        replacesArtifacts: true
