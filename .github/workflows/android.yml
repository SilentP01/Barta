name: Android CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 9.5.1

    - name: Build APK (System Gradle)
      run: |
        cd android
        # We use 'gradle' instead of './gradlew' to avoid the missing JAR error
        gradle assembleRelease --stacktrace

    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: ncipollo/release-action@v1
      with:
        artifacts: "android/app/build/outputs/apk/release/*.apk"
        tag: "v${{ github.run_number }}"
        name: "Release v${{ github.run_number }}"
        body: "Automated build from GitHub Actions. Download the APK below."
        token: ${{ secrets.GITHUB_TOKEN }}
        allowUpdates: true
