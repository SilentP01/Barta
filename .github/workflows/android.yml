name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Clean Build (Strict Gradle 8.7)
      run: |
        cd android
        gradle wrapper --gradle-version 8.7
        chmod +x gradlew
        ./gradlew assembleDebug --stacktrace --warning-mode all

    - name: Prepare APK for Release
      run: |
        mkdir -p release
        cp android/app/build/outputs/apk/debug/app-debug.apk release/Barta.apk

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: barta-apk
        path: release/Barta.apk

    - name: Create Release
      uses: softprops/action-gh-release@v2
      if: github.ref == 'refs/heads/main'
      with:
        tag_name: "v21.0.${{ github.run_number }}"
        name: "Barta App v21.0.${{ github.run_number }}"
        body: "Barta P2P Messenger - Official Mobile Release"
        files: release/Barta.apk
        overwrite: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
