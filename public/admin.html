<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Barta Admin Panel</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --bg: #0f1117;
        --surface: #1a1d27;
        --border: #2a2d3a;
        --accent: #14b8a6;
        --accent-hover: #0d9488;
        --danger: #ef4444;
        --danger-hover: #dc2626;
        --text: #e2e8f0;
        --muted: #64748b;
        --radius: 10px;
      }
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 24px; }
      h1 { font-size: 1.5rem; font-weight: 700; color: var(--accent); margin-bottom: 24px; }
      h2 { font-size: 1rem; font-weight: 600; margin-bottom: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
      .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 24px; }
      label { display: block; font-size: .85rem; color: var(--muted); margin-bottom: 4px; margin-top: 12px; }
      input { width: 100%; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: .95rem; outline: none; transition: border .2s; }
      input:focus { border-color: var(--accent); }
      .row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }
      button { padding: 10px 18px; border: none; border-radius: 6px; font-size: .9rem; font-weight: 600; cursor: pointer; transition: background .2s; }
      .btn-primary { background: var(--accent); color: #fff; }
      .btn-primary:hover { background: var(--accent-hover); }
      .btn-danger { background: var(--danger); color: #fff; }
      .btn-danger:hover { background: var(--danger-hover); }
      .btn-ghost { background: var(--border); color: var(--text); }
      .btn-ghost:hover { background: #3a3d4a; }
      #notice { padding: 10px 14px; border-radius: 6px; font-size: .9rem; margin-bottom: 16px; display: none; }
      #notice.ok { background: #14b8a620; color: var(--accent); border: 1px solid var(--accent); display: block; }
      #notice.err { background: #ef444420; color: var(--danger); border: 1px solid var(--danger); display: block; }
      table { width: 100%; border-collapse: collapse; font-size: .9rem; }
      th { text-align: left; padding: 8px 12px; color: var(--muted); border-bottom: 1px solid var(--border); font-weight: 600; font-size: .8rem; text-transform: uppercase; }
      td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; word-break: break-all; }
      tr:last-child td { border-bottom: none; }
      .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: .75rem; font-weight: 600; }
      .badge.verified { background: #14b8a620; color: var(--accent); }
      .badge.unverified { background: #ef444420; color: var(--danger); }
      #lock { max-width: 360px; margin: 80px auto; }
    </style>
  </head>
  <body>
    <div id="lock" class="card">
      <h1>🔐 Admin Access</h1>
      <label>Admin Secret Key</label>
      <input type="password" id="secretInput" placeholder="Enter ADMIN_SECRET" />
      <div class="row"><button class="btn-primary" onclick="unlock()">Unlock</button></div>
      <div id="lockNotice" style="margin-top:12px;font-size:.85rem;color:var(--danger);"></div>
    </div>

    <div id="panel" style="display:none;max-width:900px;margin:0 auto;">
      <h1>⚙️ Barta Admin Panel</h1>
      <div id="notice"></div>

      <div class="card">
        <h2>Add New User</h2>
        <label>Email</label>
        <input type="email" id="newEmail" placeholder="friend@example.com" />
        <label>Username</label>
        <input type="text" id="newUsername" placeholder="username123" />
        <label>Password <span style="color:var(--muted);font-size:.8rem;">(leave blank for default: 0000000000)</span></label>
        <input type="text" id="newPassword" placeholder="0000000000" />
        <div class="row">
          <button class="btn-primary" onclick="addUser()">Create User</button>
        </div>
      </div>

      <div class="card">
        <h2>All Users</h2>
        <div class="row" style="margin-bottom:12px;">
          <button class="btn-ghost" onclick="loadUsers()">↺ Refresh</button>
        </div>
        <div id="tableWrap"><p style="color:var(--muted)">Loading...</p></div>
      </div>
    </div>

    <script>
      let secret = "";

      function setNotice(msg, isErr = false) {
        const el = document.getElementById("notice");
        el.textContent = msg;
        el.className = isErr ? "err" : "ok";
      }

      function unlock() {
        const val = document.getElementById("secretInput").value.trim();
        if (!val) { document.getElementById("lockNotice").textContent = "Enter the secret key."; return; }
        secret = val;
        document.getElementById("lock").style.display = "none";
        document.getElementById("panel").style.display = "block";
        loadUsers();
      }

      document.getElementById("secretInput").addEventListener("keydown", e => { if (e.key === "Enter") unlock(); });

      async function apiFetch(method, path, body) {
        const opts = { method, headers: { "x-admin-secret": secret, "Content-Type": "application/json" } };
        if (body) opts.body = JSON.stringify(body);
        const res = await fetch(path, opts);
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || "Request failed.");
        return data;
      }

      async function loadUsers() {
        document.getElementById("tableWrap").innerHTML = "<p style='color:var(--muted)'>Loading...</p>";
        try {
          const { users } = await apiFetch("GET", "/api/admin/users");
          if (!users.length) { document.getElementById("tableWrap").innerHTML = "<p style='color:var(--muted)'>No users found.</p>"; return; }
          const rows = users.map(u => `
            <tr>
              <td><strong>@${u.username}</strong></td>
              <td>${u.email}</td>
              <td><span class="badge ${u.email_verified ? 'verified' : 'unverified'}">${u.email_verified ? 'Verified' : 'Unverified'}</span></td>
              <td style="color:var(--muted);font-size:.8rem;">${new Date(u.created_at).toLocaleDateString()}</td>
              <td><button class="btn-danger" style="padding:6px 12px;font-size:.8rem;" onclick="deleteUser('${u.username}')">Delete</button></td>
            </tr>`).join("");
          document.getElementById("tableWrap").innerHTML = `
            <table>
              <thead><tr><th>Username</th><th>Email</th><th>Status</th><th>Joined</th><th></th></tr></thead>
              <tbody>${rows}</tbody>
            </table>`;
        } catch (e) {
          setNotice(e.message, true);
        }
      }

      async function addUser() {
        const email = document.getElementById("newEmail").value.trim();
        const username = document.getElementById("newUsername").value.trim();
        const password = document.getElementById("newPassword").value.trim() || "0000000000";
        if (!email || !username) { setNotice("Email and username are required.", true); return; }
        try {
          const data = await apiFetch("POST", "/api/admin/users", { email, username, password });
          setNotice(data.message);
          document.getElementById("newEmail").value = "";
          document.getElementById("newUsername").value = "";
          document.getElementById("newPassword").value = "";
          loadUsers();
        } catch (e) {
          setNotice(e.message, true);
        }
      }

      async function deleteUser(username) {
        if (!confirm(`Delete @${username}? This cannot be undone.`)) return;
        try {
          const data = await apiFetch("DELETE", `/api/admin/users/${encodeURIComponent(username)}`);
          setNotice(data.message);
          loadUsers();
        } catch (e) {
          setNotice(e.message, true);
        }
      }
    </script>
  </body>
</html>
