<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Barta</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app">
      <!-- AUTH -->
      <section class="auth-view" id="authView">
        <div class="brand">
          <span class="brand-mark"></span>
          <div>
            <h1>Barta</h1>
            <p>Sign in to start a private session.</p>
          </div>
        </div>

        <div class="auth-panel">
          <div class="tabs" role="tablist">
            <button class="tab active" id="loginTab" type="button">Login</button>
            <button class="tab" id="signupTab" type="button">Signup</button>
          </div>

          <form id="loginForm" class="form">
            <label>
              Username or email
              <input name="identifier" autocomplete="username" required />
            </label>
            <label>
              Password
              <div class="password-field">
                <input name="password" type="password" autocomplete="current-password" required />
                <button class="ghost password-toggle" type="button" data-toggle-password>Show</button>
              </div>
            </label>
            <button class="primary" type="submit" data-default-text="Login">Login</button>
            <button class="ghost" id="forgotPasswordBtn" type="button">Forgot password</button>
          </form>

          <form id="signupForm" class="form hidden">
            <label>
              Email
              <input name="email" type="email" autocomplete="email" required />
            </label>
            <label>
              Unique username
              <input name="username" autocomplete="username" pattern="[A-Za-z0-9_]{3,24}" required />
            </label>
            <label>
              Password
              <div class="password-field">
                <input name="password" type="password" autocomplete="new-password" minlength="10" required />
                <button class="ghost password-toggle" type="button" data-toggle-password>Show</button>
              </div>
            </label>
            <label>
              Confirm password
              <div class="password-field">
                <input name="passwordConfirm" type="password" autocomplete="new-password" minlength="10" required />
                <button class="ghost password-toggle" type="button" data-toggle-password>Show</button>
              </div>
            </label>
            <button class="primary" type="submit" data-default-text="Create account">Create account</button>
          </form>

          <form id="verifyForm" class="form hidden">
            <label>
              Email
              <input name="email" type="email" autocomplete="email" readonly required />
            </label>
            <button class="primary" id="resendVerifyBtn" type="button">Resend magic link</button>
            <button class="ghost" id="verifyBackBtn" type="button">Back to login</button>
          </form>

          <form id="forgotForm" class="form hidden">
            <label>
              Email
              <input name="email" type="email" autocomplete="email" required />
            </label>
            <button class="primary" type="submit" data-default-text="Send reset link">Send reset link</button>
            <button class="ghost" id="backToLoginBtn" type="button">Back to login</button>
          </form>

          <form id="resetForm" class="form hidden">
            <input name="token" type="hidden" />
            <label>
              New password
              <div class="password-field">
                <input name="password" type="password" autocomplete="new-password" minlength="10" required />
                <button class="ghost password-toggle" type="button" data-toggle-password>Show</button>
              </div>
            </label>
            <label>
              Confirm password
              <div class="password-field">
                <input name="passwordConfirm" type="password" autocomplete="new-password" minlength="10" required />
                <button class="ghost password-toggle" type="button" data-toggle-password>Show</button>
              </div>
            </label>
            <button class="primary" type="submit" data-default-text="Reset password">Reset password</button>
          </form>
          <p class="notice" id="authNotice"></p>
        </div>
      </section>

      <!-- DASHBOARD -->
      <section class="dashboard hidden" id="dashboard">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
          <div class="account">
            <div>
              <span class="muted">Signed in</span>
              <strong id="currentUser"></strong>
            </div>
            <button class="ghost" id="profileBtn" type="button">Profile</button>
            <button class="ghost" id="logoutBtn" type="button">Logout</button>
          </div>

          <div class="profile-panel hidden" id="profilePanel">
            <div class="profile-head">
              <strong>Profile</strong>
              <button class="ghost" id="closeProfileBtn" type="button">Close</button>
            </div>
            <p class="muted" id="profileEmail"></p>

            <form class="form compact-form" id="profileEmailForm">
              <label>
                New email
                <input name="email" type="email" autocomplete="email" required />
              </label>
              <button class="secondary" type="submit" data-default-text="Send email link">Send email link</button>
            </form>

            <form class="form compact-form hidden" id="profileEmailVerifyForm"></form>

            <form class="form compact-form" id="profilePasswordOtpForm">
              <button class="secondary" type="submit" data-default-text="Send password link">Send password link</button>
            </form>

            <form class="form compact-form hidden" id="profilePasswordForm"></form>
            <p class="notice" id="profileNotice"></p>
          </div>

          <form class="search" id="searchForm">
            <input name="username" placeholder="Search username" autocomplete="off" />
            <button type="submit">Search</button>
          </form>
          <div class="search-result" id="searchResult"></div>

          <h2>Online Users</h2>
          <div class="user-list" id="userList"></div>
        </aside>

        <!-- Workspace -->
        <section class="workspace" id="workspace">
          <div class="requests" id="requests"></div>

          <div class="empty-state" id="emptyState">
            <h2>No active connection</h2>
            <p>Select an online user to send a request.</p>
          </div>

          <div class="peer-view hidden" id="peerView">
            <header class="peer-header">
              <button class="back-btn" id="backBtn" type="button">&#8592;</button>
              <div>
                <span class="muted" id="peerStatus">Connecting</span>
                <h2 id="peerName"></h2>
              </div>
              <div class="peer-actions">
                <button class="call-btn" id="startCallBtn" type="button" disabled title="Start Video">
                  <!-- phone icon -->
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15.05 5A5 5 0 0 1 19 8.95M15.05 1A9 9 0 0 1 23 8.94m-1 7.98v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.72 11 19.79 19.79 0 0 1 1.67 2.37 2 2 0 0 1 3.64.36h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 7.91a16 16 0 0 0 6.16 6.16l1.02-.99a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                </button>
                <button class="call-btn end-call hidden" id="endCallBtn" type="button" title="End Call">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="1" y1="1" x2="23" y2="23"/><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 5a10.94 10.94 0 0 0 2.95 7.05M10.56 6.1A10.94 10.94 0 0 1 19 9M8 8l6 6"/></svg>
                </button>
                <button class="call-btn fullscreen-btn hidden" id="fullscreenBtn" type="button" title="Fullscreen">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
                </button>
              </div>
              <button class="danger" id="disconnectBtn" type="button">Disconnect</button>
            </header>

            <!-- VIDEO CALL: floating PiP by default, goes fullscreen on button -->
            <div class="video-call hidden" id="videoCall">
              <video id="remoteVideo" autoplay playsinline></video>
              <video id="localVideo" autoplay muted playsinline></video>
              <button class="pip-close" id="pipCloseBtn" type="button" title="Close video">✕</button>
            </div>

            <!-- Fullscreen video overlay -->
            <div class="video-fullscreen hidden" id="videoFullscreen">
              <video id="remoteVideoFull" autoplay playsinline></video>
              <video id="localVideoFull" autoplay muted playsinline></video>
              <div class="fullscreen-controls">
                <button class="fs-btn" id="exitFullscreenBtn">&#x2715; Exit</button>
                <button class="fs-btn end-call" id="endCallFsBtn">End Call</button>
              </div>
            </div>

            <div class="messages" id="messages"></div>

            <form class="composer" id="messageForm">
              <input id="messageInput" placeholder="Waiting for peer connection" autocomplete="off" disabled />
              <input id="fileInput" type="file" hidden />
              <button class="icon-btn" id="fileBtn" type="button" disabled title="Send file">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
              </button>
              <button class="primary send-btn" id="sendBtn" type="submit" disabled>Send</button>
            </form>
          </div>
        </section>
      </section>
    </main>

    <script src="/app.js?v=5"></script>
  </body>
</html>
